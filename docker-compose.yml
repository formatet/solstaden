services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: solstaden
      POSTGRES_USER: solstaden
      POSTGRES_PASSWORD: solstaden
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    ports:
      - "5432:5432"

  api:
    build: ./api
    environment:
      DATABASE_URL: postgresql://solstaden:solstaden@db:5432/solstaden
    ports:
      - "8000:8000"
    depends_on:
      - db
    volumes:
      - ./api:/app

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  pgdata:
