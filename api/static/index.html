<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solstaden</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #f5e9c9;
      font-family: Georgia, 'Times New Roman', serif;
      color: #2c1a00;
      padding: 2rem;
      text-align: center;
    }

    .sun {
      font-size: 4rem;
      margin-bottom: 1.5rem;
      animation: pulse 4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.08); opacity: 0.85; }
    }

    h1 {
      font-size: clamp(2.2rem, 6vw, 3.5rem);
      font-weight: normal;
      letter-spacing: 0.04em;
      margin-bottom: 1rem;
    }

    .tagline {
      font-size: clamp(1rem, 2.5vw, 1.3rem);
      line-height: 1.7;
      max-width: 480px;
      color: #5c3d00;
      margin-bottom: 2.5rem;
    }

    .tagline em {
      font-style: italic;
      color: #2c1a00;
    }

    .badge {
      display: inline-block;
      background: #2c1a00;
      color: #f5e9c9;
      font-family: system-ui, sans-serif;
      font-size: 0.8rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.5rem 1.2rem;
      border-radius: 2rem;
    }

    footer {
      position: fixed;
      bottom: 1.5rem;
      font-family: system-ui, sans-serif;
      font-size: 0.75rem;
      color: #9c7040;
      letter-spacing: 0.06em;
    }
  </style>
</head>
<body>
  <div class="sun">☀</div>
  <h1>Solstaden</h1>
  <p class="tagline">
    Det finns få saker bättre än en kall öl<br>
    i <em>solen</em> på en uteservering i Göteborg.<br><br>
    Vi håller på att ta reda på exakt var solen är —
    varje kvart, hela sommaren.
  </p>
  <span class="badge">Kommer snart</span>
  <footer>Göteborg &mdash; formatet.se</footer>
</body>
</html>
